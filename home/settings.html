<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <aside class="sidebar">
      <div class="logo-box">
        <img src="/images/logo1.png" alt="Site logo">
      </div>

      <nav class="nav">
        <a href="/home/dashboard.html" class="nav-btn">
          <span class="icon">▦</span> Dashboard
        </a>
        <a href="#" class="nav-btn">
          <span class="icon">🎓</span> Scholarships
        </a>
        <a href="#" class="nav-btn">
          <span class="icon">◔</span> Profile
        </a>
        <a href="#" class="nav-btn">
          <span class="icon">☰</span> Updates
        </a>
        <a href="#" class="nav-btn nav-btn--active">
          <span class="icon">⚙</span> Settings
        </a>
        <a href="/signin/signin.html" class="nav-btn">Logout</a>
      </nav>
    </aside>

    
    <div class="main">

      <header class="topbar">
        <div class="search">
          <input type="text" placeholder="Search here">
          <button aria-label="Search">🔍</button>
        </div>

        <div class="topbar-right">
          <button class="bell" aria-label="Notifications">
            🔔 <span class="badge">2</span>
          </button>
          <img class="avatar" src="/images/logo1.png" alt="User avatar">
          <div class="user-info">
            <div class="user-name">Toshe Sample</div>
            <div class="user-role">Admin</div>
          </div>
        </div>
      </header>

      
      <section class="card settings-card">

        <h2 class="settings-heading">Two-factor Authentication</h2>
        <label class="toggle-row">
          <span class="toggle">
            <input type="checkbox" checked>
            <span class="toggle-track"></span>
          </span>
          Enable
        </label>

        <h2 class="settings-heading settings-heading--spaced">Change Password</h2>

        <div class="form-group">
          <label for="current-pw">Current Password</label>
          <input id="current-pw" type="password" placeholder="**********">
        </div>

        <div class="form-group">
          <label for="new-pw">New Password</label>
          <input id="new-pw" type="password" placeholder="**********">
        </div>

        <div class="form-group">
          <label for="confirm-pw">Confirm new Password</label>
          <input id="confirm-pw" type="password" placeholder="**********">
        </div>

        <hr class="divider">

        <div class="card-actions">
          <button class="btn btn--ghost">Cancel</button>
          <button class="btn btn--primary">Save</button>
        </div>
      </section>

      
      <section class="card settings-card notifications-card">

        <div class="notifications-top">
          <div>
            <h2 class="settings-heading">Notifications</h2>
            <label class="toggle-row">
              <span class="toggle">
                <input type="checkbox" checked>
                <span class="toggle-track"></span>
              </span>
              Allow notifications
            </label>
          </div>

          <label class="toggle-row">
            <span class="toggle">
              <input type="checkbox" checked>
              <span class="toggle-track"></span>
            </span>
            Dark Mode
          </label>
        </div>

        <h3 class="settings-subheading">Other Notifications</h3>

        <div class="toggle-list">
          <label class="toggle-row">
            <span class="toggle">
              <input type="checkbox">
              <span class="toggle-track"></span>
            </span>
            Allow text notifications
          </label>

          <label class="toggle-row">
            <span class="toggle">
              <input type="checkbox">
              <span class="toggle-track"></span>
            </span>
            Allow deadline reminders
          </label>

          <label class="toggle-row">
            <span class="toggle">
              <input type="checkbox">
              <span class="toggle-track"></span>
            </span>
            Allow email notifications
          </label>

          <label class="toggle-row">
            <span class="toggle">
              <input type="checkbox">
              <span class="toggle-track"></span>
            </span>
            Allow scholarship recommendations
          </label>

          <label class="toggle-row">
            <span class="toggle">
              <input type="checkbox" checked>
              <span class="toggle-track"></span>
            </span>
            Allow application status reminders
          </label>

          <label class="toggle-row">
            <span class="toggle">
              <input type="checkbox" checked>
              <span class="toggle-track"></span>
            </span>
            Allow deadline notifications
          </label>
        </div>

        <div class="card-actions">
          <button class="btn btn--ghost">Cancel</button>
          <button class="btn btn--primary btn--dark">Save Changes</button>
        </div>
      </section>

    </div>
  </div>

</body>
</html>
